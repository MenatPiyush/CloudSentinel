name: deploy

on:
  push:
    branches:
      - main           # full deploy on merge to main
  pull_request:
    branches:
      - main           # terraform plan only on PRs (no apply, no deploy)
  workflow_dispatch:   # allow manual runs from the GitHub UI

# Prevent two concurrent runs from colliding on the same environment.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight deploy; queue instead

env:
  AWS_REGION:       us-east-1
  ECR_REPO:         cloudsentinel-governance-api
  # Which k8s deployment to update.  CI always pushes to "green".
  # Blue stays on the previous stable image until green is promoted.
  DEPLOY_COLOR:     green

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1 – Build the governance-api container and push to ECR
  # ─────────────────────────────────────────────────────────
  build-push:
    name: Build & Push image to ECR
    runs-on: ubuntu-latest
    # outputs consumed by later jobs
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      ecr_image: ${{ steps.meta.outputs.image }}

    permissions:
      id-token: write   # required for OIDC token exchange
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Exchange the GitHub OIDC token for temporary AWS credentials.
      # No long-lived AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY needed.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_SHARED_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Build a short SHA tag so every image is uniquely identifiable.
      - name: Compute image tag
        id: meta
        run: |
          TAG="${{ env.DEPLOY_COLOR }}-${{ github.sha }}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          IMAGE="${REGISTRY}/${{ env.ECR_REPO }}:${TAG}"
          echo "tag=${TAG}"   >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.image }}" \
            --label "git-sha=${{ github.sha }}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      - name: Push image to ECR
        # Only push on merges to main (not on PR plan-only runs).
        if: github.event_name != 'pull_request'
        run: docker push "${{ steps.meta.outputs.image }}"

  # ─────────────────────────────────────────────────────────
  # Job 2 – Terraform plan (always) / apply (main only)
  # ─────────────────────────────────────────────────────────
  terraform:
    name: Terraform ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}
    runs-on: ubuntu-latest
    needs: build-push

    permissions:
      id-token: write
      contents: read
      pull-requests: write   # allows posting plan output as a PR comment

    defaults:
      run:
        working-directory: terraform/workload-prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var="region=${{ env.AWS_REGION }}" \
            -var="shared_services_lambda_arn=${{ secrets.SHARED_SERVICES_LAMBDA_ARN }}" \
            -var="shared_services_account_id=${{ secrets.SHARED_SERVICES_ACCOUNT_ID }}" \
            -var="db_password=${{ secrets.RDS_DB_PASSWORD }}"

      # Post the plan diff as a PR comment so reviewers can see what will change.
      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${plan}\n\`\`\``
            });

      - name: Terraform Apply
        # Only apply on pushes to main (never on PRs).
        if: github.event_name != 'pull_request'
        run: terraform apply -input=false -auto-approve tfplan

  # ─────────────────────────────────────────────────────────
  # Job 3 – Deploy k8s manifests (blue/green + App Mesh)
  # Runs only on push to main after Terraform apply succeeds.
  # ─────────────────────────────────────────────────────────
  deploy-k8s:
    name: Deploy to EKS (green)
    runs-on: ubuntu-latest
    needs: [build-push, terraform]
    if: github.event_name != 'pull_request'

    permissions:
      id-token: write
      contents: read

    env:
      ECR_IMAGE: ${{ needs.build-push.outputs.ecr_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Pull cluster name from Terraform output (avoids hardcoding).
      - name: Get EKS cluster name
        id: cluster
        working-directory: terraform/workload-prod
        run: |
          terraform init -input=false -reconfigure
          echo "name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name   ${{ steps.cluster.outputs.name }}

      # Apply base resources first (namespace must exist before apps).
      - name: Apply base manifests
        run: kubectl apply -f k8s/base/

      # Patch the green deployment to use the freshly-built image.
      # This is a surgical update – blue is untouched.
      - name: Update green image
        run: |
          kubectl set image deployment/governance-api-green \
            governance-api=${{ env.ECR_IMAGE }} \
            -n governance

      # Apply blue/green services + weighted ingress.
      - name: Apply governance-api manifests
        run: kubectl apply -f k8s/apps/governance-api/

      # Apply App Mesh resources (Mesh, VirtualNodes, VirtualRouter, VirtualService).
      - name: Apply App Mesh manifests
        run: kubectl apply -f k8s/apps/app-mesh/

      # Wait for green rollout to finish before declaring success.
      - name: Wait for green rollout
        run: |
          kubectl rollout status deployment/governance-api-green \
            -n governance \
            --timeout=5m

      - name: Verify green pods are ready
        run: |
          kubectl get pods -n governance -l color=green
          kubectl get ingress -n governance
