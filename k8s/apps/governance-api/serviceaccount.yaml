---
# ServiceAccount used by both blue and green governance-api pods.
# The eks.amazonaws.com/role-arn annotation wires IRSA (IAM Roles for
# Service Accounts) so pods can call AWS APIs (DynamoDB, SNS, etc.)
# using a short-lived token – no access keys needed.
#
# Replace <ACCOUNT_ID> with your AWS account ID before applying.
# The role itself is created by Terraform (workload-prod infra).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: governance-api
  namespace: governance
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/cloudsentinel-governance-api
