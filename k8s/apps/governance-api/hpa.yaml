---
# HPA for blue (stable) deployment.
# Scales pods from 2 up to 10 based on average CPU utilization.
# When a traffic spike hits, pods scale first (fast, seconds),
# then if nodes run out of capacity, Cluster Autoscaler adds nodes (slower, ~2 min).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: governance-api-blue
  namespace: governance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: governance-api-blue
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale up when average pod CPU exceeds 60%.
          # Kept lower than the node alarm threshold (80%) so pods
          # scale before the node becomes a bottleneck.
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      # React quickly to spikes: allow doubling pods every 30 seconds.
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      # Scale down conservatively: wait 5 minutes of low traffic before removing pods.
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# HPA for green (canary) deployment.
# Smaller range: green only takes 10% of traffic so it rarely needs more than 3 pods.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: governance-api-green
  namespace: governance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: governance-api-green
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
